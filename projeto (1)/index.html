<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login Barbearia</title>

    <link rel="stylesheet" href="style.css">

    <!-- ICONS -->
    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
</head>
<body>

    <section class="login-page">

        <!-- OVERLAY -->
        <div class="overlay"></div>

        <!-- CARD -->
        <div class="login-card">

            <!-- LOGO -->
            <img src="Logotipo_barbearia_profissional_cinza_e_vermelho-removebg-preview.png" class="logo" alt="Logo">

            <!-- TÍTULO -->
            <h1>Bem vindo de volta</h1>

            <p>
                Faça login para acessar e gerenciar seus agendamentos
            </p>

            <!-- FORM -->
            <form>

                <!-- EMAIL -->
                <div class="input-box">
                    <i class="fa-regular fa-envelope"></i>

                    <input
                    type="email"
                    placeholder="E-mail"
                    required
                    >
                </div>

                <!-- SENHA -->
                <div class="input-box">
                    <i class="fa-solid fa-lock"></i>

                    <input
                    type="password"
                    placeholder="Senha"
                    required
                    >

                    <i class="fa-regular fa-eye-slash"></i>
                </div>

                <!-- OPÇÕES -->
                <div class="options">

                    <label>
                        <input type="checkbox">
                        Lembrar de mim
                    </label>

                    <a href="#">
                        Esqueceu sua senha?
                    </a>

                </div>

                <!-- BOTÃO -->
                <button type="submit">
                    ENTRAR
                </button>

            </form>

            <!-- CADASTRO -->
            <div class="register">

                <span>
                    Não tem uma conta?
                </span>

                <a href="#">
                    Criar conta
                </a>

            </div>

        </div>

    </section>

    <script src="script.js"></script>

</body>
</html>
