<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login Barbearia</title>

    <link rel="stylesheet" href="style.css">

    <!-- ICONS -->
    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
</head>
<body>

    <section class="login-page">

        <!-- OVERLAY -->
        <div class="overlay"></div>

        <!-- CARD -->
        <div class="login-card">

            <!-- LOGO -->
            <img src="Logotipo_barbearia_profissional_cinza_e_vermelho-removebg-preview.png" class="logo" alt="Logo">

            <!-- TÍTULO -->
            <h1>Crie seu Login</h1>

            <p>
               Sua barbearia, agora de cara nova. Crie sua conta e venha nos conhecer!
            </p>

            <!-- FORM -->
            <form>

                <!-- USUÁRIO -->
                <div
                class="input-box"
                >
                    <i class="fa-solid fa-user"></i>

                    <input
                    type="text"
                    placeholder="Usuário"
                    required
                    >
                </div>

                <!-- TELEFONE -->
                <div class="input-box">
                    <i class="fa-solid fa-phone"></i>

                    <input
                    type="tel"
                    placeholder="Telefone"
                    required
                    >
                </div>

                <!-- EMAIL -->
                <div class="input-box">
                    <i class="fa-regular fa-envelope"></i>

                    <input
                    type="email"
                    placeholder="E-mail"
                    required
                    >
                </div>

                <!-- SENHA -->
                <div class="input-box">
                    <i class="fa-solid fa-lock"></i>

                    <input
                    type="password"
                    placeholder="Senha"
                    id="senha"
                    required
                    >

                    <i class="fa-regular fa-eye-slash"></i>
                </div>

                <!-- CONFIRMAR SENHA -->
                <div class="input-box">
                    <i class="fa-solid fa-lock"></i>

                    <input
                    type="password"
                    placeholder="Confirmar Senha"
                    id="confirmarSenha"
                    required
                    >

                    <i class="fa-regular fa-eye-slash"></i>
                </div>

                <!-- OPÇÕES -->
                <div class="options">

                    <label>
                        <input type="checkbox">
                        Eu concordo com os termos de uso e a política de privacidade
                    </label>


                </div>

                <!-- BOTÃO -->
                <button type="submit">
                    CRIAR CONTA
                </button>

            </form>

            <!-- CADASTRO -->
            <div class="register">

                <span>
                    Já tem uma conta?
                </span>

                <a href="#">
                    Fazer login
                </a>

            </div>

        </div>

    </section>

    <script src="script.js"></script>

</body>
</html>
