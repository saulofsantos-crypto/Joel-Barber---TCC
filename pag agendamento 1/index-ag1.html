<!DOCTYPE html>
<html lang="pt-Br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style-ag1.css">
    <title>Agende seu horário</title>
</head>

<body>
    <header>
        
        <!-- LOGO -->
        <div class="logo">
            <img src="Logotipo_barbearia_profissional_cinza_e_vermelho-removebg-preview.png" alt="Logo Joel Barber" id="foto">
        </div>
        
        <!-- MENU -->
        <nav>
            <ul>
                <li><a href="#">Início</a></li>
                
                <li><a href="#agendamentos">
                    Agendamentos
                </a></li>
                
                <li><a href="#produtos">
                    Produtos
                </a></li>
                
                <li><a href="#fila">
                    Fila de Espera
                </a></li>
            </ul>
        </nav>
        
        <!-- BOTÕES -->
        <div class="buttons">
            
            <button class="btn-login" onclick="login()">
                Entrar
            </button>
            
            <button class="btn-cadastro" onclick="criarConta()">
                Criar Conta
            </button>
            
        </div>
        
    </header>
    
    <main > 
        <section class="container-pagina-lateral">
            <div class="card-barbearia">
                    <img src="img-barbearia/img-barbearia.png" alt="Fundo Barbearia">
                        <div class="conteudo-card">
                        <h1>Agende seu horário</h1>
                        <hr class="divisor">
                        <p>Escolha o serviço, o profissional e o melhor horário para você.</p>
                    
                        <button class="btn-agendamento">
                            <span class="icone-calendario">📅</span> FAZER AGENDAMENTO
                        </button>
                    </div>
            </div>
            
            
        </section>

        <section class="container-pagina-icones">
            <div class="bola-1">
                <img src="icones/icon-aperto-de-mao.png" alt="icone de um aperto de mão">
            </div>
            <div class="bola-2">
                <!-- conteudo aqui -->
            </div>
            <div class="bola-3">
                <!-- conteudo aqui -->
            </div>
            <div class="bola-4">
                <!-- conteudo aqui -->
            </div>
        </section>
        
        <section class="container-pagina-servico">
            <div class="corte-cabelo">
                <img src="icones/icone-cabelo.png" alt="">
            </div>
            <div class="barba">
                <img src="icones/icon-barba.png" alt="icone de uma barba">
            </div>
            <div class="cabelo-e-barba">
                <img src="icones/icone-cabelo.png" alt="icone de um cabelo masculino">
            </div>
            <div class="sobrancelha">
                <img src="icones/icon-navalha.png" alt="icone de uma navalha para representar o serviço de barba">
            </div>
        </section>
    </main>
    
    <script src="script-ag1.js"></script>
    <footer>
        ©
    </footer>
</body>
</html>
